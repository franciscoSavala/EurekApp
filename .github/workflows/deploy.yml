name: Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'Backend/**'

jobs:
  build-and-deploy:
    name: Build JAR y Deploy a EC2
    runs-on: ubuntu-latest

    steps:
      - name: Verificar secrets requeridos
        run: |
          MISSING=""
          [ -z "${{ secrets.EC2_HOST }}"    ] && MISSING="$MISSING EC2_HOST"
          [ -z "${{ secrets.EC2_USER }}"    ] && MISSING="$MISSING EC2_USER"
          [ -z "${{ secrets.EC2_SSH_KEY }}" ] && MISSING="$MISSING EC2_SSH_KEY"
          if [ -n "$MISSING" ]; then
            echo "ERROR: Los siguientes GitHub Secrets no están configurados:$MISSING"
            echo "Configurarlos en: Settings > Secrets and variables > Actions"
            exit 1
          fi

      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (sin tests)
        working-directory: Backend
        run: ./mvnw package -DskipTests

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copiar JAR a EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo mkdir -p /opt/eurekapp && sudo chown ${{ secrets.EC2_USER }}:${{ secrets.EC2_USER }} /opt/eurekapp"
          scp -i ~/.ssh/deploy_key \
            Backend/target/Backend-0.0.1.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/eurekapp/backend.jar

      - name: Reiniciar servicio en EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo systemctl restart eurekapp && sudo systemctl is-active --quiet eurekapp && echo 'Servicio reiniciado OK'"
