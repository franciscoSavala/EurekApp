name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'Backend/**'

jobs:
  build-and-deploy:
    name: Build JAR y Deploy a EC2
    runs-on: ubuntu-latest

    steps:
      - name: Verificar secrets requeridos
        run: |
          MISSING=""
          [ -z "${{ secrets.EC2_HOST }}"         ] && MISSING="$MISSING EC2_HOST"
          [ -z "${{ secrets.EC2_USER }}"         ] && MISSING="$MISSING EC2_USER"
          [ -z "${{ secrets.EC2_SSH_KEY }}"      ] && MISSING="$MISSING EC2_SSH_KEY"
          [ -z "${{ secrets.DATABASE_URL }}"     ] && MISSING="$MISSING DATABASE_URL"
          [ -z "${{ secrets.DATABASE_USER }}"    ] && MISSING="$MISSING DATABASE_USER"
          [ -z "${{ secrets.DATABASE_PASS }}"    ] && MISSING="$MISSING DATABASE_PASS"
          [ -z "${{ secrets.OPENAI_SECRET_KEY }}" ] && MISSING="$MISSING OPENAI_SECRET_KEY"
          [ -z "${{ secrets.JWT_SIGN_KEY }}"     ] && MISSING="$MISSING JWT_SIGN_KEY"
          [ -z "${{ secrets.MAILTRAP_KEY }}"     ] && MISSING="$MISSING MAILTRAP_KEY"
          if [ -n "$MISSING" ]; then
            echo "ERROR: Secrets faltantes:$MISSING"
            echo "Configurarlos en: Settings > Secrets and variables > Actions"
            exit 1
          fi

      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (sin tests)
        working-directory: Backend
        run: ./mvnw package -DskipTests

      - name: Configurar clave SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts || true
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Escribir .env.prod en EC2
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "cat > /opt/eurekapp/.env.prod <<'ENVEOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          DATABASE_USER=${{ secrets.DATABASE_USER }}
          DATABASE_PASS=${{ secrets.DATABASE_PASS }}
          OPENAI_SECRET_KEY=${{ secrets.OPENAI_SECRET_KEY }}
          JWT_SIGN_KEY=${{ secrets.JWT_SIGN_KEY }}
          MAILTRAP_KEY=${{ secrets.MAILTRAP_KEY }}
          ENVEOF
          chmod 600 /opt/eurekapp/.env.prod"

      - name: Copiar JAR a EC2
        run: |
          scp -i ~/.ssh/deploy_key \
            Backend/target/Backend-0.0.1.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/backend.jar
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo mv ~/backend.jar /opt/eurekapp/backend.jar"

      - name: Reiniciar servicio en EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo systemctl restart eurekapp"

      - name: Health check
        run: |
          sleep 20
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "curl -sf http://localhost:8080/actuator/health || (sudo journalctl -u eurekapp -n 50 && exit 1)"
