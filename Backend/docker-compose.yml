services:
  mysql:
    image: mysql:8.0
    container_name: eurekapp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: eurekapp
      MYSQL_USER: eurekapp
      MYSQL_PASSWORD: eurekapp
    ports:
      - "3306:3306"
    volumes:
      - eurekapp_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "eurekapp", "-peurekapp", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  weaviate:
    image: semitechnologies/weaviate:1.24.1
    container_name: eurekapp-weaviate
    ports:
      - "8081:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
    volumes:
      - eurekapp_weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  # Vectorización de imágenes con CLIP (EU-321). Se buildea local desde ../clip-service.
  # La primera vez descarga ~600MB de pesos al volumen eurekapp_clip_models (una sola vez).
  clip-service:
    build:
      context: ../clip-service
    container_name: eurekapp-clip
    ports:
      - "8000:8000"
    environment:
      HF_HOME: /models
      # hf-xet (transferencia por chunks de HuggingFace) se cuelga al bajar los pesos sin HF_TOKEN.
      # Forzamos la descarga HTTP clásica (con timeouts y reintentos) para que el primer arranque
      # no se quede colgado. Es descarga de una sola vez; luego queda cacheada en el volumen.
      HF_HUB_DISABLE_XET: "1"
    volumes:
      - eurekapp_clip_models:/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

volumes:
  eurekapp_mysql_data:
  eurekapp_weaviate_data:
  eurekapp_clip_models:
