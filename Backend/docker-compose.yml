services:
  mysql:
    image: mysql:8.0
    container_name: eurekapp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: eurekapp
      MYSQL_USER: eurekapp
      MYSQL_PASSWORD: eurekapp
    ports:
      - "3306:3306"
    volumes:
      - eurekapp_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "eurekapp", "-peurekapp", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  weaviate:
    image: semitechnologies/weaviate:1.24.1
    container_name: eurekapp-weaviate
    ports:
      - "8081:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
    volumes:
      - eurekapp_weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

volumes:
  eurekapp_mysql_data:
  eurekapp_weaviate_data:
