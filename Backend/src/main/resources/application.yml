spring:
  application:
    name: Backend
  servlet:
    multipart:
      max-file-size: 10MB
    encoding:
      charset: UTF-8
      force: true
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-init-sql: "SET NAMES utf8mb4"
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:8081,http://localhost:8082,http://localhost:8083,http://localhost:3000}
application:
  s3:
    bucket:
      name: 'eurekapp-temp'
  openai:
    url: 'https://api.openai.com/v1/'
    api-key: ${OPENAI_SECRET_KEY}
  pinecone:
    api-key: ${PINECONE_SECRET_KEY:unused}
  jwt:
    sign-key: ${JWT_SIGN_KEY}
    access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:60}
    refresh-token-expiration-minutes: ${JWT_REFRESH_TOKEN_EXPIRATION_MINUTES:43200}
  mail:
    host: 'smtp.gmail.com'
    user: ${MAIL_USER}
    password: ${MAIL_PASSWORD}
    port: '587'
  weaviate:
    url: '${WEAVIATE_URL:localhost:8081}'
    schema: 'http'
search:
  max-radius: 50000
fraud:
  max-claims-per-period: 3
  claim-period-days: 30
  finder-claimer-collusion-threshold: 2