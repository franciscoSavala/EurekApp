spring:
  application:
    name: Backend
  servlet:
    multipart:
      max-file-size: 10MB
    encoding:
      charset: UTF-8
      force: true
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-init-sql: "SET NAMES utf8mb4"
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:8081,http://localhost:8082,http://localhost:8083,http://localhost:3000}
application:
  s3:
    bucket:
      name: 'eurekapp-temp'
  openai:
    url: 'https://api.openai.com/v1/'
    api-key: ${OPENAI_SECRET_KEY}
  clip:
    # Microservicio de vectorización de imágenes (clip-service, EU-321). En local corre en
    # Docker publicado en localhost:8000; en prod se apunta con la env CLIP_URL.
    url: ${CLIP_URL:http://localhost:8000}
  pinecone:
    api-key: ${PINECONE_SECRET_KEY:unused}
  jwt:
    sign-key: ${JWT_SIGN_KEY}
    access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:60}
    refresh-token-expiration-minutes: ${JWT_REFRESH_TOKEN_EXPIRATION_MINUTES:43200}
  mail:
    host: 'smtp.gmail.com'
    user: ${MAIL_USER}
    password: ${MAIL_PASSWORD}
    port: '587'
  weaviate:
    url: '${WEAVIATE_URL:localhost:8081}'
    schema: 'http'
search:
  max-radius: 50000
  # EU-324: parámetros calibrables del puntaje de coincidencias. Externalizados para poder
  # ajustarlos SIN recompilar (basta editar acá / una env var y reiniciar). Se calibran en EU-327.
  scoring:
    # Piso del modulador geográfico dentro del radio: mismo lugar => 1, lejos => geo-floor (nunca 0).
    geo-floor: 0.75
    # Ponderaciones α (imagen) / β (texto) por categoría. Conviene que image + text sumen 1.
    # Billetera/credenciales: manda el texto (DNI, nombre). Ropa: manda la foto (el texto ensucia).
    # Celular/llaves/otros: mitad y mitad.
    weights:
      BILLETERA: { image: 0.35, text: 0.65 }
      ROPA:      { image: 0.85, text: 0.15 }
      CELULAR:   { image: 0.50, text: 0.50 }
      LLAVES:    { image: 0.50, text: 0.50 }
      OTROS:     { image: 0.50, text: 0.50 }