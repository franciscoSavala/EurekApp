spring:
  datasource:
    url: jdbc:mysql://localhost:3306/eurekapp?useUnicode=true&characterEncoding=UTF-8
    username: eurekapp
    password: eurekapp
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

application:
  s3:
    bucket:
      name: 'eurekapp-temp-local'
  openai:
    url: 'https://api.openai.com/v1/'
    api-key: ${OPENAI_SECRET_KEY}           # requerido: setear en .env.local
  jwt:
    sign-key: ${JWT_SIGN_KEY}               # requerido: setear en .env.local
  mail:
    host: 'smtp.gmail.com'
    user: ${MAIL_USER}                      # requerido: setear en .env.local
    password: ${MAIL_PASSWORD}              # requerido: setear en .env.local
    port: '587'
  weaviate:
    url: 'localhost:8081'
    schema: 'http'

search:
  max-radius: 50000
