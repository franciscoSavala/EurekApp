<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<body>
<div th:replace="~{email/layout :: email-wrapper(~{::content})}">
  <th:block th:ref="content">
    <h2 style="color: #017575; margin-top: 0;">¡Alguien podría haber encontrado tu objeto!</h2>
    <p style="color: #333; line-height: 1.6;">
      Se cargó un objeto en <strong th:text="${orgName}">Organización</strong> que coincide con búsquedas que tenés abiertas en EurekApp.
    </p>
    <div style="background-color: #f0f4f4; border-radius: 6px; padding: 16px; margin: 20px 0;">
      <p style="margin: 0 0 6px 0; font-weight: bold; color: #555;">Este objeto coincide con estas búsquedas abiertas:</p>
      <ul style="margin: 0; padding-left: 20px; color: #333; line-height: 1.6;">
        <li th:each="desc : ${searchDescriptions}" th:text="${desc}"></li>
      </ul>
    </div>
    <div style="text-align: center; margin: 24px 0;">
      <img th:src="${imageUrl}" alt="Objeto encontrado"
           style="max-width: 100%; max-height: 400px; border-radius: 8px; border: 1px solid #dde8e8;"/>
    </div>
    <div style="background-color: #e8f5f5; border-left: 4px solid #017575; padding: 16px; border-radius: 4px;">
      <p style="margin: 0 0 4px 0; font-weight: bold; color: #017575;">Información de contacto</p>
      <p style="margin: 0; color: #333;" th:text="${contactData}"></p>
    </div>
    <p style="color: #333; line-height: 1.6; margin-top: 20px;">
      Si reconocés el objeto, ingresá a EurekApp para más detalles.
    </p>
  </th:block>
</div>
</body>
</html>
