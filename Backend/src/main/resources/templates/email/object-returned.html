<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<body>
<div th:replace="~{email/layout :: email-wrapper(~{::content})}">
  <th:block th:ref="content">
    <h2 style="color: #017575; margin-top: 0;">¡Tu objeto encontrado fue devuelto!</h2>
    <p style="color: #333; line-height: 1.6;">
      Hola, <strong th:text="${firstName}">Usuario</strong>.
    </p>
    <p style="color: #333; line-height: 1.6;">
      El objeto <strong th:text="${objectTitle}">Objeto</strong> que registraste fue devuelto a su dueño.
    </p>

    <table width="100%" cellpadding="0" cellspacing="0"
           style="border: 1px solid #dde8e8; border-radius: 6px; margin: 20px 0;">
      <tr style="background-color: #f0f4f4;">
        <td colspan="2" style="padding: 10px 16px; font-weight: bold; color: #017575; font-size: 14px;">
          Detalles de la devolución
        </td>
      </tr>
      <tr>
        <td style="padding: 8px 16px; color: #555; width: 40%;">Fecha y hora</td>
        <td style="padding: 8px 16px; color: #333;" th:text="${returnDateTime}"></td>
      </tr>
      <tr style="background-color: #fafafa;">
        <td style="padding: 8px 16px; color: #555;">DNI de quien retiró</td>
        <td style="padding: 8px 16px; color: #333;" th:text="${dni}"></td>
      </tr>
      <tr>
        <td style="padding: 8px 16px; color: #555;">Registrado por</td>
        <td style="padding: 8px 16px; color: #333;">
          <span th:text="${firstName}"></span> <span th:text="${lastName}"></span>
        </td>
      </tr>
    </table>

    <div style="background-color: #e8f5f5; border-radius: 6px; padding: 16px; text-align: center;">
      <p style="margin: 0; color: #017575; font-size: 18px; font-weight: bold;">
        +10 puntos de experiencia
      </p>
      <p style="margin: 6px 0 0 0; color: #555; font-size: 13px;">
        ¡Gracias por tu contribución a la comunidad!
      </p>
    </div>
  </th:block>
</div>
</body>
</html>
