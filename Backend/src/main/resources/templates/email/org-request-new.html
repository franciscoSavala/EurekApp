<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<body>
<div th:replace="~{email/layout :: email-wrapper(~{::content})}">
  <th:block th:ref="content">
    <h2 style="color: #017575; margin-top: 0;">Nueva solicitud de registro de organización</h2>

    <table width="100%" cellpadding="0" cellspacing="0"
           style="border: 1px solid #dde8e8; border-radius: 6px; margin-bottom: 20px;">
      <tr style="background-color: #f0f4f4;">
        <td colspan="2" style="padding: 10px 16px; font-weight: bold; color: #017575; font-size: 14px;">
          Solicitante
        </td>
      </tr>
      <tr>
        <td style="padding: 8px 16px; color: #555; width: 40%;">Nombre</td>
        <td style="padding: 8px 16px; color: #333;">
          <span th:text="${requesterFirstName}"></span>
          <span th:text="${requesterLastName}"></span>
        </td>
      </tr>
      <tr style="background-color: #fafafa;">
        <td style="padding: 8px 16px; color: #555;">Email</td>
        <td style="padding: 8px 16px; color: #333;" th:text="${requesterEmail}"></td>
      </tr>
    </table>

    <table width="100%" cellpadding="0" cellspacing="0"
           style="border: 1px solid #dde8e8; border-radius: 6px; margin-bottom: 20px;">
      <tr style="background-color: #f0f4f4;">
        <td colspan="2" style="padding: 10px 16px; font-weight: bold; color: #017575; font-size: 14px;">
          Datos de la organización
        </td>
      </tr>
      <tr>
        <td style="padding: 8px 16px; color: #555; width: 40%;">Nombre</td>
        <td style="padding: 8px 16px; color: #333;" th:text="${orgName}"></td>
      </tr>
      <tr style="background-color: #fafafa;">
        <td style="padding: 8px 16px; color: #555;">Tipo</td>
        <td style="padding: 8px 16px; color: #333;">
          <span th:text="${orgType}"></span>
          <span th:if="${customType != null and !#strings.isEmpty(customType)}">
            (<span th:text="${customType}"></span>)
          </span>
        </td>
      </tr>
      <tr>
        <td style="padding: 8px 16px; color: #555;">Dirección</td>
        <td style="padding: 8px 16px; color: #333;">
          <span th:text="${street}"></span> <span th:text="${streetNumber}"></span>,
          <span th:text="${city}"></span>,
          <span th:text="${province}"></span>,
          <span th:text="${country}"></span>
        </td>
      </tr>
      <tr style="background-color: #fafafa;">
        <td style="padding: 8px 16px; color: #555;">Coordenadas</td>
        <td style="padding: 8px 16px; color: #333;">
          <span th:text="${#numbers.formatDecimal(latitude, 1, 6)}"></span>,
          <span th:text="${#numbers.formatDecimal(longitude, 1, 6)}"></span>
        </td>
      </tr>
    </table>

    <table width="100%" cellpadding="0" cellspacing="0"
           style="border: 1px solid #dde8e8; border-radius: 6px; margin-bottom: 20px;">
      <tr style="background-color: #f0f4f4;">
        <td colspan="2" style="padding: 10px 16px; font-weight: bold; color: #017575; font-size: 14px;">
          Responsable propuesto
        </td>
      </tr>
      <tr>
        <td style="padding: 8px 16px; color: #555; width: 40%;">Nombre</td>
        <td style="padding: 8px 16px; color: #333;">
          <span th:text="${ownerFirstName}"></span> <span th:text="${ownerLastName}"></span>
        </td>
      </tr>
      <tr style="background-color: #fafafa;">
        <td style="padding: 8px 16px; color: #555;">Email</td>
        <td style="padding: 8px 16px; color: #333;" th:text="${ownerEmail}"></td>
      </tr>
      <tr>
        <td style="padding: 8px 16px; color: #555;">Teléfono</td>
        <td style="padding: 8px 16px; color: #333;" th:text="${ownerPhone}"></td>
      </tr>
    </table>

    <table width="100%" cellpadding="0" cellspacing="0"
           style="border: 1px solid #dde8e8; border-radius: 6px; margin-bottom: 20px;">
      <tr>
        <td style="padding: 8px 16px; color: #555; width: 40%;">Fecha de solicitud</td>
        <td style="padding: 8px 16px; color: #333;" th:text="${createdAt}"></td>
      </tr>
    </table>

    <div style="background-color: #f0f4f4; border-radius: 6px; padding: 16px; margin-bottom: 8px;">
      <p style="margin: 0 0 8px 0; font-weight: bold; color: #017575;">Motivo de la solicitud</p>
      <p style="margin: 0; color: #333; line-height: 1.6;" th:text="${reason}"></p>
    </div>
  </th:block>
</div>
</body>
</html>
