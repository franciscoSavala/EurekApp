<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>
<body>

<!--/* Fragmento: envuelve el cuerpo completo del email con header y footer */-->
<div th:fragment="email-wrapper(content)"
     style="font-family: Arial, Helvetica, sans-serif; background-color: #f4f7f7; padding: 32px 16px; margin: 0;">
  <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 600px; margin: 0 auto;">
    <tr>
      <td>
        <!-- Header -->
        <div style="background-color: #017575; border-radius: 8px 8px 0 0; padding: 24px 32px; text-align: center;">
          <span style="color: #ffffff; font-size: 26px; font-weight: bold; letter-spacing: 1px;">EurekApp</span>
          <p style="color: #b2dfdf; font-size: 13px; margin: 4px 0 0 0;">La red de objetos perdidos de Córdoba</p>
        </div>
        <!-- Body -->
        <div style="background-color: #ffffff; padding: 32px 32px 24px 32px; border-left: 1px solid #dde8e8; border-right: 1px solid #dde8e8;">
          <th:block th:replace="${content}"/>
        </div>
        <!-- Footer -->
        <div style="background-color: #f0f4f4; border-radius: 0 0 8px 8px; padding: 16px 32px; text-align: center; border: 1px solid #dde8e8; border-top: none;">
          <p style="color: #888; font-size: 12px; margin: 0;">
            Este es un mensaje automático de EurekApp. Por favor, no respondas este correo.
          </p>
          <p style="color: #aaa; font-size: 11px; margin: 6px 0 0 0;">
            &copy; 2025 EurekApp &mdash; Córdoba, Argentina
          </p>
        </div>
      </td>
    </tr>
  </table>
</div>

</body>
</html>
