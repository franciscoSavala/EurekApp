<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<body>
<div th:replace="~{email/layout :: email-wrapper(~{::content})}">
  <th:block th:ref="content">
    <h2 style="color: #017575; margin-top: 0;">Tu organización volvió a operar</h2>
    <p style="color: #333; line-height: 1.6;">
      Hola, <strong th:text="${firstName}">Usuario</strong>.
    </p>
    <p style="color: #333; line-height: 1.6;">
      La organización <strong th:text="${orgName}">Organización</strong> fue
      <strong style="color: #017575;">reactivada</strong> en EurekApp.
    </p>
    <div style="background-color: #e8f5f5; border-left: 4px solid #017575; padding: 16px; border-radius: 4px; margin: 20px 0;">
      <p style="margin: 0; color: #555; line-height: 1.6;">
        Ya podés volver a iniciar sesión y acceder a todas las funcionalidades de la plataforma.
      </p>
    </div>
  </th:block>
</div>
</body>
</html>
